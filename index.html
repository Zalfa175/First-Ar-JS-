<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Praktikum AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
</head>
<body style='margin: 0; overflow: hidden;'>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>
        <a-assets>
            <a-asset-item id="model3d" src="scene.gltf"></a-asset-item>

            <audio id="backsound" src="audio.mp3" preload="auto"></audio>
        </a-assets>

        <a-marker id="marker_custom" type='pattern' url='pattern-marker.patt'>
            <a-gltf-model src="#model3d" scale="0.5 0.5 0.5" position="0 0 0" animation-mixer></a-gltf-model>

            <a-sound id="suara_objek" src="#backsound" loop="true" volume="10" position="0 0 0"></a-sound>
        </a-marker>
        
        <a-entity camera></a-entity>
        
    </a-scene>
    
    <script>
        window.addEventListener('load', () => {
            const marker = document.querySelector('#marker_custom');
            const suara = document.querySelector('#suara_objek');

            // Ketika marker berhasil terdeteksi oleh kamera
            marker.addEventListener('markerFound', () => {
                suara.components.sound.playSound();
            });

            // Ketika marker hilang dari jangkauan kamera
            marker.addEventListener('markerLost', () => {
                suara.components.sound.pauseSound();
            });
        });
    </script>

</body>
</html>
